    <style>
        :root {
            --bg-dark: #050811;          /* Sleek Obsidian Black */

            --text-primary: #f8fafc;     /* Clean off-white */
            --text-secondary: #94a3b8;   /* Soft slate gray */
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ==========================================================================
           3D ZOOM-IN STARTUP INTRO (GLOW-FREE & DYNAMIC)
           ========================================================================== */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            perspective: 1000px; /* High depth perspective for cinematic zoom */
            transition: opacity 0.9s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 3D Scene Container */
        .intro-3d-scene {
            position: relative;
            width: 300px;
            height: 300px;
            transform-style: preserve-3d;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: sceneEntrance 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Lowercase Name Asset zooming in 3D */
        .intro-title-asset {
            font-family: 'Space Mono', monospace;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-transform: lowercase;
            letter-spacing: -2px;
            transform-style: preserve-3d;
            position: absolute;
            animation: textZoom 2.8s cubic-bezier(0.15, 0.85, 0.35, 1) forwards;
        }

        /* Solid tech geometric structural lines (No glows) */
        .intro-frame-asset {
            position: absolute;
            width: 260px;
            height: 80px;
            border: 2px solid var(--accent-blue);
            transform-style: preserve-3d;
            animation: frameZoom 2.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        .intro-ring-asset {
            position: absolute;
            width: 180px;
            height: 180px;
            border: 1px dashed var(--text-secondary);
            border-radius: 50%;
            transform-style: preserve-3d;
            animation: ringZoom 2.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
        }

        /* Animations for 3D Camera Fly-through */
        @keyframes sceneEntrance {
            0% {
                transform: rotateX(20deg) rotateY(-10deg) rotateZ(-5deg);
            }
            100% {
                transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            }
        }

        @keyframes textZoom {
            0% {
                transform: translateZ(-1500px) scale(0.1);
                opacity: 0;
            }
            30% {
                opacity: 1;
            }
            85% {
                transform: translateZ(50px) scale(1.1);
                opacity: 1;
            }
            100% {
                transform: translateZ(500px) scale(2.2);
                opacity: 0;
            }
        }

        @keyframes frameZoom {
            0% {
                transform: translateZ(-2000px) rotateZ(-90deg);
                opacity: 0;
            }
            20% {
                opacity: 0.6;
            }
            80% {
                transform: translateZ(100px) rotateZ(10deg);
                opacity: 0.8;
            }
            100% {
                transform: translateZ(600px) rotateZ(20deg);
                opacity: 0;
            }
        }

        @keyframes ringZoom {
            0% {
                transform: translateZ(-1000px) rotateX(45deg);
                opacity: 0;
            }
            40% {
                opacity: 0.5;
            }
            90% {
                transform: translateZ(200px) rotateX(0deg);
                opacity: 0.5;
            }
            100% {
                transform: translateZ(700px);
                opacity: 0;
            }
        }

        /* App Reveal Stage - Fly past the camera */
        .loaded #loader-overlay {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.5);
        }


        /* ==========================================================================
           MAIN PAGE LAYOUT & CASCADING REVEALS
           ========================================================================== */
        #app-content {
            z-index: 10;
            position: relative;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Seamless Staggered Entry Configurations */
        .reveal-item {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .reveal-item.revealed {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navigation Bar */
        nav {
            display: flex;
            justify-content: flex-end;
            padding: 30px 5%;
        }

        /* Minimalist Dropdown */
        select {
            background-color: var(--panel-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
            transition: border-color 0.25s ease;
        }

        select:hover, select:focus {
            border-color: var(--accent-blue);
        }

        /* Central Layout Content */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
            max-width: 900px;
            padding: 0 24px 60px 24px;
            text-align: center;
        }

        /* Flat Profile Frame */
        .pfp-frame {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            padding: 4px;
            background: var(--accent-blue);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Separate transition configuration to prevent hover clashing during page reveal */
        .pfp-frame.reveal-item {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .pfp-frame.reveal-item.revealed {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.3s ease;
        }

        .pfp-frame.reveal-item.revealed:hover {
            transform: scale(1.03);
        }

        .pfp-frame img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--bg-dark);
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        /* Headings */
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            color: var(--text-primary);
            margin-bottom: 12px;
            text-transform: lowercase;
        }

        .description {
            font-size: 1.15rem;
            max-width: 600px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 45px;
            font-weight: 400;
        }

        /* Clean Card Grid System (No shadows/glows) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 750px;
            margin-bottom: 45px;
        }

        .stat-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px 15px;
            position: relative;
        }

        .stat-card.reveal-item {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.8s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.25s ease;
        }

        .stat-card.reveal-item.revealed {
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 0.25s ease,
                        border-color 0.25s ease;
        }

        .stat-card.reveal-item.revealed:hover {
            transform: translateY(-3px);
            border-color: var(--accent-blue);
        }

        .stat-card.live::after {
            content: "LIVE";
            position: absolute;
            top: 15px;
            right: 15px;
            color: #ef4444;
            font-family: 'Space Mono', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.05em;

        .stat-title {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;

            font-family: 'Space Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;

            .pfp-frame { width: 120px; height: 120px; }
            nav { padding: 20px; justify-content: center; }
            select { width: 100%; max-width: 320px; }
        }
    </style>

        // 1. Language Detection Engine (HTML5 Path Router Integration)
        async function detectAndSetLanguage() {
            let detectedLang = "en";

            // Check if there's a stored redirect path from our 404 handler
            let path = sessionStorage.redirect;
            if (path) {
                delete sessionStorage.redirect;
                // Rewrite dynamic URL path seamlessly in history without hash
                window.history.replaceState(null, null, path);
            } else {
                path = window.location.pathname;
            }

            // Extract locale slug e.g. "/es/" -> "es"
            const cleanPath = path.replace(/^\/|\/$/g, '').toLowerCase();

            if (translations[cleanPath]) {
                detectedLang = cleanPath;
                applyDetectedLang(detectedLang);
                return;
            }

            // Fallback process: Geolocation IP engine
            try {
                const geoResponse = await fetch('https://ipapi.co/json/');
                const geoData = await geoResponse.json();
                
                if (geoData && geoData.country_code) {
                    const mappedLang = countryToLang[geoData.country_code.toUpperCase()];
                    if (mappedLang) {
                        detectedLang = mappedLang;
                    }
                }
            } catch (e) {
                console.warn("Geo IP blocked. Reading browser configuration language.");
                const browserLang = navigator.language.split('-')[0].toLowerCase();
                if (translations[browserLang]) {
                    detectedLang = browserLang;
                }
            }

            applyDetectedLang(detectedLang);
        }

        function applyDetectedLang(lang) {
            document.getElementById("languageSelector").value = lang;
            // Write to the URL as `/lang` without changing pages
            window.history.replaceState(null, null, "/" + lang);
            applyLanguage(lang);
        }

        function userSelectedLanguage() {
            const selected = document.getElementById("languageSelector").value;
            // Adds state entry to window history allowing back button navigation
            window.history.pushState(null, null, "/" + selected);
            applyLanguage(selected);
        }

        function applyLanguage(lang) {
            const elements = [
                document.getElementById("description"), 
                document.getElementById("lblSubs"), 
                document.getElementById("lblViews"), 
                document.getElementById("lblVideos"), 
                document.getElementById("subscribeBtn")
            ];
            
            elements.forEach(el => el.style.opacity = '0');

            setTimeout(() => {
                document.getElementById("description").innerText = translations[lang].d;
                document.getElementById("lblSubs").innerText = translations[lang].s;
                document.getElementById("lblViews").innerText = translations[lang].v;
                document.getElementById("lblVideos").innerText = translations[lang].vi;
                document.getElementById("subscribeBtn").innerText = translations[lang].b;
                
                elements.forEach(el => el.style.opacity = '1');
            }, 300);
        }

        // Listen for history state pop changes (back/forward browser triggers)
        window.addEventListener('popstate', () => {
            const path = window.location.pathname.replace(/^\/|\/$/g, '').toLowerCase();
            if (translations[path]) {
                document.getElementById("languageSelector").value = path;
                applyLanguage(path);
            }
        });

        // 2. Real-Time API Data Injection Helper (Prevents popping)
        function updateStat(elementId, value) {
            const element = document.getElementById(elementId);
            if (!element) return;
            
            element.style.opacity = '0'; // Melt previous value away
            
            setTimeout(() => {
                element.innerText = value;
                element.style.opacity = '1'; // Fade in the real value
            }, 250);
        }

        // Real API processing
        async function fetchYouTubeStats() {
            const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CHANNEL_ID}&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const channelData = data.items[0];
                    const stats = channelData.statistics;
                    const snippet = channelData.snippet;
                    
                    // Update profile picture URL
                    const pfpUrl = snippet.thumbnails.high.url;
                    const pfpElement = document.getElementById("pfpImage");
                    pfpElement.src = pfpUrl;
                    pfpElement.onload = () => pfpElement.style.opacity = '1';

                    // Update Favicon directly
                    document.getElementById("favicon").href = pfpUrl;

                    // Hydrate elements with fade-in safety transitions
                    updateStat("statViews", formatNumber(stats.viewCount));
                    updateStat("statVideos", stats.videoCount);
                    updateStat("statSubs", parseInt(stats.subscriberCount).toLocaleString());
                }
            } catch (error) {
                console.error("Error fetching YouTube Stats:", error);
                updateStat("statSubs", "20,000+");
                updateStat("statViews", "1.5M");
                updateStat("statVideos", "150");
                document.getElementById("pfpImage").src = "New Project (2).png";
                document.getElementById("pfpImage").style.opacity = '1';
            }
        }

        function formatNumber(num) {
            const val = parseInt(num);
            if (val >= 1000000) return (val / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
            if (val >= 1000) return (val / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
            return val;
        }

        // Initialize Intro Sequence
        window.onload = () => {
            detectAndSetLanguage();
            fetchYouTubeStats();

            // Run camera-fly sequence, then step reveal main elements
            setTimeout(() => {
                document.body.classList.add('loaded');
                
                // Fetch all cascading reveal-designated elements
                const items = document.querySelectorAll('.reveal-item');
                items.forEach((item, index) => {
                    setTimeout(() => {
                        item.classList.add('revealed');
                    }, 120 * index); // Stagger element entry in 120ms delays
                });
            }, 2800); // Sequence aligns precisely with the 3D text flythrough end
        };
